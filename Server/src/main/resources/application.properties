spring.application.name=Server

# Upload Config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# Todo: Need modification in production env
app.upload.location=C:/Development/repositories/HSI-SYSTEM/SharedData/uploads

# Spring Config
spring.config.import=keys.properties

# Redis Configuration
spring.data.redis.host=192.168.0.110
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=2000ms
spring.data.redis.password=20230612

# Task Queue Configuration
app.task-queue.name=hsi-task-queue
app.task-queue.consumer-group=hsi-consumers

# Datasource Settings
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
